name: Void AI Deploy

on:
  push:
    branches: [main, ai]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd void-ai && npm install
          pip install -r requirements.txt
          
      - name: Build Void AI Web
        run: cd void-ai && npm run build
        
      - name: Run tests
        run: |
          cd void-ai && npm run lint
          python3 -m pytest tests/ -v 2>/dev/null || true
          
      - name: Build Docker image
        run: docker build -t void-ai:latest -f docker/Dockerfile .
        
      - name: Build Ollama models
        run: |
          echo "Models ready for Ollama deployment"
          ls -la models/*/Modelfile
          
      - name: Create release package
        run: |
          mkdir -p dist
          tar -czf dist/void-ai.tar.gz \
            void-ai/ \
            models/ \
            bin/ \
            install.sh \
            void.config \
            requirements.txt \
            README.md \
            LICENSE
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-ai-package
          path: dist/void-ai.tar.gz
